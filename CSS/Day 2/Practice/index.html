<!DOCTYPE html>
<html lang="en">
    <head>
  <meta charset="UTF-8" />
  <title>Style Practice Day 2</title>
  <style>
    *{
        margin: 0;
        padding: 0;
    }
    .box{
        height: 200px;
        width: 300px;
        padding: 15px;
        border: 2px solid red;
    }
    .box1{
        box-sizing: border-box;
        background-color: gray;
    }
    .box2{
        box-sizing: content-box;
        background-color: green;
    }

  </style>
  </head>
  <body>
    <div class="box box1"> Box 1 (border-box)
         </div>
     <div class="box box2"> Box 2 (content-box) 
        
     </div>
  </body>
</html>
